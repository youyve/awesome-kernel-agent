# Single source of truth for awesome-kernel-agent.
# Edit this file, then run:  python3 scripts/generate.py
# Schema: id, name, org, date "YYYY-MM", route (A|B|C|D|E|tool), status
# (open|partial|wip|closed|proprietary), dsl (primary; decides the README
# section), dsl_also[], hardware[], code/paper/blog (>=1 of code|paper),
# desc (one line, key result), note (honest caveats),
# claims-hygiene fields (objective, cite-or-unknown, never guess):
#   evaluated_on[]   - which benchmark(s) the headline numbers come from
#   claim_baseline   - what the self-reported speedup is measured AGAINST
#   ships_kernels    - yes|partial|no|unknown (re-runnable generated kernels public = auditable)
#   budget_disclosed - yes|partial|no|unknown (attempts/iterations/tokens reported)
