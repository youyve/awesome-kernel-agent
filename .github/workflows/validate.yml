name: validate
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml
      - run: python3 scripts/generate.py --check
      - name: Ensure README is regenerated
        run: |
          python3 scripts/generate.py
          git diff --exit-code README.md README.zh.md data/agents.json
